<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — AlphaSignal</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { justify-content: center; align-items: center; }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .auth-card h1 {
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }
        .auth-card p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-card label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .auth-card input[type="email"],
        .auth-card input[type="password"],
        .auth-card input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }
        .auth-card input:focus {
            border-color: var(--accent);
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(79,140,255,0.3);
            border-radius: 8px;
            background: rgba(79,140,255,0.12);
            color: var(--accent);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.15s;
        }
        .auth-card button:hover {
            background: rgba(79,140,255,0.22);
            border-color: rgba(79,140,255,0.5);
        }
        .auth-card .error {
            background: rgba(248, 113, 113, 0.15);
            color: var(--red);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .auth-card .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .btn-oauth {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 11px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.15s;
            box-sizing: border-box;
        }
        .btn-oauth:hover { opacity: 0.85; }
        .btn-google {
            background: #fff;
            color: #3c4043;
            border: 1px solid #dadce0;
        }
        .btn-kakao {
            background: #fee500;
            color: #000;
            border: 1px solid #fee500;
        }
        .oauth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            color: var(--text-muted);
            font-size: 12px;
        }
        .oauth-divider::before,
        .oauth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="/static/img/logo.png" alt="AlphaSignal" style="max-width:200px;margin:0 auto 8px;display:block;">
        <p class="subtitle">로그인</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% if oauth_google_enabled or oauth_kakao_enabled %}
        <div class="oauth-buttons">
          {% if oauth_google_enabled %}
            <a href="/auth/oauth/google/start?next={{ next_url|urlencode }}"
               class="btn-oauth btn-google">
              <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
                <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
              </svg>
              Google 로 계속하기
            </a>
          {% endif %}
          {% if oauth_kakao_enabled %}
            <a href="/auth/oauth/kakao/start?next={{ next_url|urlencode }}"
               class="btn-oauth btn-kakao">
              <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                <path fill="#000" d="M9 1C4.589 1 1 3.797 1 7.252c0 2.231 1.495 4.193 3.755 5.319l-.953 3.485c-.083.302.249.547.521.385L8.7 14.04A11.04 11.04 0 0 0 9 14.046c4.411 0 8-2.798 8-6.794C17 3.797 13.411 1 9 1z"/>
              </svg>
              카카오로 계속하기
            </a>
          {% endif %}
        </div>
        <div class="oauth-divider"><span>또는</span></div>
        {% endif %}

        <form method="post" action="/auth/login">
            <input type="hidden" name="next" value="{{ next_url }}">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" required autofocus placeholder="name@example.com">

            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required placeholder="8자 이상">

            <button type="submit">로그인</button>
        </form>

        <div class="footer-link">
            계정이 없으신가요? <a href="/auth/register">회원가입</a>
        </div>
    </div>
</body>
</html>

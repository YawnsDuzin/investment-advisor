<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Investment Advisor{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- 모바일 햄버거 버튼 -->
    <button class="mobile-menu-btn" onclick="document.body.classList.toggle('sidebar-open')" aria-label="메뉴">
        <span></span><span></span><span></span>
    </button>
    <!-- 모바일 오버레이 -->
    <div class="sidebar-overlay" onclick="document.body.classList.remove('sidebar-open')"></div>

    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>Investment<br>Advisor</h1>
        </div>
        <ul class="nav-menu">
            <li><a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}" onclick="document.body.classList.remove('sidebar-open')">Dashboard</a></li>
            <li><a href="/pages/sessions" class="{% if active_page == 'sessions' %}active{% endif %}" onclick="document.body.classList.remove('sidebar-open')">Sessions</a></li>
            <li><a href="/pages/themes" class="{% if active_page == 'themes' %}active{% endif %}" onclick="document.body.classList.remove('sidebar-open')">Themes</a></li>
            <li><a href="/pages/proposals" class="{% if active_page == 'proposals' %}active{% endif %}" onclick="document.body.classList.remove('sidebar-open')">Proposals</a></li>
            <li><a href="/pages/chat" class="{% if active_page == 'chat' %}active{% endif %}" onclick="document.body.classList.remove('sidebar-open')">Theme Chat</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/admin" style="display:block;padding:8px 0;{% if active_page == 'admin' %}color:var(--accent);font-weight:600;{% endif %}">Admin</a>
            <a href="/docs" target="_blank">API Docs</a>
        </div>
    </nav>

    <main class="content">
        <header class="content-header">
            <h2>{% block page_title %}{% endblock %}</h2>
            {% block header_actions %}{% endblock %}
        </header>
        <div class="content-body">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>

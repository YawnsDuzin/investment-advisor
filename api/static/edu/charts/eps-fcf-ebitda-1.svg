<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#0f1419"/>

  <!-- Title -->
  <text x="400" y="30" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="bold">EPS·FCF·EBITDA — 한 종목 4분기 비교</text>
  <text x="400" y="50" font-size="12" fill="#94a3b8" text-anchor="middle">예시 종목 — 회계이익 vs 현금이익 vs 운영효율</text>

  <!-- Grid lines (y=370 is zero, chart height=290, max=500) -->
  <!-- y_svg = 370 - val/500 * 290 -->
  <!-- val=0: y=370, val=100: y=312, val=200: y=254, val=300: y=196, val=400: y=138, val=500: y=80 -->

  <!-- Gridlines -->
  <line x1="80" y1="370" x2="720" y2="370" stroke="#2d3748" stroke-width="1"/>
  <line x1="80" y1="312" x2="720" y2="312" stroke="#2d3748" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="254" x2="720" y2="254" stroke="#2d3748" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="196" x2="720" y2="196" stroke="#2d3748" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="138" x2="720" y2="138" stroke="#2d3748" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="80" x2="720" y2="80" stroke="#2d3748" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y-axis labels -->
  <text x="70" y="374" font-size="10" fill="#94a3b8" text-anchor="end">0</text>
  <text x="70" y="316" font-size="10" fill="#94a3b8" text-anchor="end">100</text>
  <text x="70" y="258" font-size="10" fill="#94a3b8" text-anchor="end">200</text>
  <text x="70" y="200" font-size="10" fill="#94a3b8" text-anchor="end">300</text>
  <text x="70" y="142" font-size="10" fill="#94a3b8" text-anchor="end">400</text>
  <text x="70" y="84" font-size="10" fill="#94a3b8" text-anchor="end">500</text>
  <!-- Y-axis unit label -->
  <text x="70" y="68" font-size="9" fill="#94a3b8" text-anchor="end">(억원)</text>

  <!-- Y-axis line -->
  <line x1="80" y1="80" x2="80" y2="370" stroke="#2d3748" stroke-width="1.5"/>

  <!-- Q1 (center x=200): EPS=120, FCF=80, EBITDA=250 -->
  <!-- EPS bar: x_left=200-57.5=142.5, y_bottom=370, height=120*290/500=69.6, y_top=300.4 -->
  <rect x="143" y="300" width="35" height="70" fill="#60a5fa" rx="2"/>
  <!-- FCF bar: x_left=200-17.5=182.5, height=80*290/500=46.4, y_top=323.6 -->
  <rect x="183" y="324" width="35" height="46" fill="#4ade80" rx="2"/>
  <!-- EBITDA bar: x_left=200+22.5=222.5, height=250*290/500=145, y_top=225 -->
  <rect x="223" y="225" width="35" height="145" fill="#f59e0b" rx="2"/>
  <!-- Q1 value labels -->
  <text x="160" y="296" font-size="9" fill="#e2e8f0" text-anchor="middle">120</text>
  <text x="200" y="320" font-size="9" fill="#e2e8f0" text-anchor="middle">80</text>
  <text x="240" y="221" font-size="9" fill="#e2e8f0" text-anchor="middle">250</text>

  <!-- Q2 (center x=360): EPS=180, FCF=200, EBITDA=320 -->
  <!-- EPS: height=180*290/500=104.4, y=370-104=266 -->
  <rect x="303" y="266" width="35" height="104" fill="#60a5fa" rx="2"/>
  <!-- FCF: height=200*290/500=116, y=370-116=254 -->
  <rect x="343" y="254" width="35" height="116" fill="#4ade80" rx="2"/>
  <!-- EBITDA: height=320*290/500=185.6, y=370-186=184 -->
  <rect x="383" y="184" width="35" height="186" fill="#f59e0b" rx="2"/>
  <!-- Q2 value labels -->
  <text x="320" y="262" font-size="9" fill="#e2e8f0" text-anchor="middle">180</text>
  <text x="360" y="250" font-size="9" fill="#e2e8f0" text-anchor="middle">200</text>
  <text x="400" y="180" font-size="9" fill="#e2e8f0" text-anchor="middle">320</text>

  <!-- Q3 (center x=520): EPS=220, FCF=150, EBITDA=380 -->
  <!-- EPS: height=220*290/500=127.6, y=370-128=242 -->
  <rect x="463" y="242" width="35" height="128" fill="#60a5fa" rx="2"/>
  <!-- FCF: height=150*290/500=87, y=370-87=283 -->
  <rect x="503" y="283" width="35" height="87" fill="#4ade80" rx="2"/>
  <!-- EBITDA: height=380*290/500=220.4, y=370-220=150 -->
  <rect x="543" y="150" width="35" height="220" fill="#f59e0b" rx="2"/>
  <!-- Q3 value labels -->
  <text x="480" y="238" font-size="9" fill="#e2e8f0" text-anchor="middle">220</text>
  <text x="520" y="279" font-size="9" fill="#e2e8f0" text-anchor="middle">150</text>
  <text x="560" y="146" font-size="9" fill="#e2e8f0" text-anchor="middle">380</text>

  <!-- Q4 (center x=680): EPS=200, FCF=280, EBITDA=410 -->
  <!-- EPS: height=200*290/500=116, y=370-116=254 -->
  <rect x="623" y="254" width="35" height="116" fill="#60a5fa" rx="2"/>
  <!-- FCF: height=280*290/500=162.4, y=370-162=208 -->
  <rect x="663" y="208" width="35" height="162" fill="#4ade80" rx="2"/>
  <!-- EBITDA: height=410*290/500=238.2, y=370-238=132 -->
  <rect x="703" y="132" width="35" height="238" fill="#f59e0b" rx="2"/>
  <!-- Q4 value labels -->
  <text x="640" y="250" font-size="9" fill="#e2e8f0" text-anchor="middle">200</text>
  <text x="680" y="204" font-size="9" fill="#e2e8f0" text-anchor="middle">280</text>
  <text x="720" y="128" font-size="9" fill="#e2e8f0" text-anchor="middle">410</text>

  <!-- X-axis labels -->
  <text x="200" y="388" font-size="12" fill="#94a3b8" text-anchor="middle">Q1</text>
  <text x="360" y="388" font-size="12" fill="#94a3b8" text-anchor="middle">Q2</text>
  <text x="520" y="388" font-size="12" fill="#94a3b8" text-anchor="middle">Q3</text>
  <text x="680" y="388" font-size="12" fill="#94a3b8" text-anchor="middle">Q4</text>

  <!-- Legend box (x=540, y=95, w=170, h=70) -->
  <rect x="540" y="95" width="170" height="70" fill="#1a1f2e" opacity="0.5" rx="4"/>
  <rect x="552" y="107" width="12" height="12" fill="#60a5fa" rx="1"/>
  <text x="570" y="118" font-size="11" fill="#e2e8f0">EPS (회계이익)</text>
  <rect x="552" y="127" width="12" height="12" fill="#4ade80" rx="1"/>
  <text x="570" y="138" font-size="11" fill="#e2e8f0">FCF (현금이익)</text>
  <rect x="552" y="147" width="12" height="12" fill="#f59e0b" rx="1"/>
  <text x="570" y="158" font-size="11" fill="#e2e8f0">EBITDA (운영효율)</text>

  <!-- Caption -->
  <text x="400" y="425" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">*세 지표가 같은 방향이면 건강 — 다른 방향이면 회계 조작·일회성 의심*</text>
</svg>

  <!-- (1,0) 0.85 → #f59e0b -->
  <rect x="210" y="160" width="58" height="58" fill="#f59e0b"/>
  <text x="239" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.85</text>

  <!-- (1,1) 1.00 → #dc2626 -->
  <rect x="270" y="160" width="58" height="58" fill="#dc2626"/>
  <text x="299" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="#e2e8f0">1.00</text>

  <!-- (1,2) 0.60 → #fbbf24 -->
  <rect x="330" y="160" width="58" height="58" fill="#fbbf24"/>
  <text x="359" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.60</text>

  <!-- (1,3) 0.63 → #fbbf24 -->
  <rect x="390" y="160" width="58" height="58" fill="#fbbf24"/>
  <text x="419" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.63</text>

  <!-- (1,4) 0.74 → #f59e0b -->
  <rect x="450" y="160" width="58" height="58" fill="#f59e0b"/>
  <text x="479" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.74</text>

  <!-- Row 2: 카카오 -->
  <!-- (2,0) 0.62 → #fbbf24 -->
  <rect x="210" y="220" width="58" height="58" fill="#fbbf24"/>
  <text x="239" y="253" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.62</text>

  <!-- (2,1) 0.60 → #fbbf24 -->
  <rect x="270" y="220" width="58" height="58" fill="#fbbf24"/>
  <text x="299" y="253" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.60</text>

  <!-- (2,2) 1.00 → #dc2626 -->
  <rect x="330" y="220" width="58" height="58" fill="#dc2626"/>
  <text x="359" y="253" text-anchor="middle" font-size="12" font-weight="bold" fill="#e2e8f0">1.00</text>

  <!-- (2,3) 0.82 → #f59e0b -->
  <rect x="390" y="220" width="58" height="58" fill="#f59e0b"/>
  <text x="419" y="253" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.82</text>

  <!-- (2,4) 0.55 → #fbbf24 -->
  <rect x="450" y="220" width="58" height="58" fill="#fbbf24"/>
  <text x="479" y="253" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.55</text>

  <!-- Row 3: 네이버 -->
  <!-- (3,0) 0.65 → #fbbf24 -->
  <rect x="210" y="280" width="58" height="58" fill="#fbbf24"/>
  <text x="239" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.65</text>

  <!-- (3,1) 0.63 → #fbbf24 -->
  <rect x="270" y="280" width="58" height="58" fill="#fbbf24"/>
  <text x="299" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.63</text>

  <!-- (3,2) 0.82 → #f59e0b -->
  <rect x="330" y="280" width="58" height="58" fill="#f59e0b"/>
  <text x="359" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.82</text>

  <!-- (3,3) 1.00 → #dc2626 -->
  <rect x="390" y="280" width="58" height="58" fill="#dc2626"/>
  <text x="419" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#e2e8f0">1.00</text>

  <!-- (3,4) 0.58 → #fbbf24 -->
  <rect x="450" y="280" width="58" height="58" fill="#fbbf24"/>
  <text x="479" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.58</text>

  <!-- Row 4: LG전자 -->
  <!-- (4,0) 0.78 → #f59e0b -->
  <rect x="210" y="340" width="58" height="58" fill="#f59e0b"/>
  <text x="239" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.78</text>

  <!-- (4,1) 0.74 → #f59e0b -->
  <rect x="270" y="340" width="58" height="58" fill="#f59e0b"/>
  <text x="299" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.74</text>

  <!-- (4,2) 0.55 → #fbbf24 -->
  <rect x="330" y="340" width="58" height="58" fill="#fbbf24"/>
  <text x="359" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.55</text>

  <!-- (4,3) 0.58 → #fbbf24 -->
  <rect x="390" y="340" width="58" height="58" fill="#fbbf24"/>
  <text x="419" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.58</text>


  <rect x="450" y="340" width="58" height="58" fill="#dc2626"/>
  <text x="479" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#e2e8f0">1.00</text>

  <!-- ===== 우측 컬러 범례 ===== -->
  <!-- 세로 그래디언트 (y=100~400, h=300) -->
  <defs>
    <linearGradient id="legend-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="33%" stop-color="#f59e0b"/>
      <stop offset="66%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect x="550" y="100" width="22" height="298" fill="url(#legend-grad)" rx="3"/>
  <rect x="550" y="100" width="22" height="298" fill="none" stroke="#2d3748" stroke-width="1" rx="3"/>

  <!-- 범례 헤더 -->
  <text x="561" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#e2e8f0">ρ</text>

  <!-- 범례 라벨 -->
  <text x="580" y="104" font-size="11" fill="#e2e8f0">1.0</text>
  <text x="580" y="200" font-size="11" fill="#e2e8f0">0.8</text>
  <text x="580" y="297" font-size="11" fill="#e2e8f0">0.6</text>
  <text x="580" y="401" font-size="11" fill="#60a5fa">0.4</text>

  <!-- 범례 눈금선 -->
  <line x1="549" y1="100" x2="576" y2="100" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="549" y1="198" x2="576" y2="198" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="549" y1="297" x2="576" y2="297" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="549" y1="398" x2="576" y2="398" stroke="#60a5fa" stroke-width="1"/>

  <!-- 색상 범례 텍스트 -->
  <rect x="620" y="120" width="12" height="12" fill="#dc2626" rx="2"/>
  <text x="638" y="131" font-size="10" fill="#94a3b8">≥0.9 매우 높음</text>
  <rect x="620" y="142" width="12" height="12" fill="#f59e0b" rx="2"/>
  <text x="638" y="153" font-size="10" fill="#94a3b8">≥0.75 높음</text>
  <rect x="620" y="164" width="12" height="12" fill="#fbbf24" rx="2"/>
  <text x="638" y="175" font-size="10" fill="#94a3b8">≥0.6 보통</text>
  <rect x="620" y="186" width="12" height="12" fill="#60a5fa" rx="2"/>
  <text x="638" y="197" font-size="10" fill="#94a3b8">≥0.4 낮음</text>

  <!-- 캡션 -->
  <text x="370" y="435" text-anchor="middle" font-size="11" fill="#94a3b8">5종목 보유해도 상관계수 0.7+ → 1종목 효과</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#0f1419"/>

  <!-- 제목 영역 -->
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">한국 IT 5종목 상관관계 — 가짜 분산</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#94a3b8">평균 ρ ≈ 0.69 → 사실상 1종목과 동일</text>

  <!-- ===== 5×5 히트맵 ===== -->
  <!-- 셀 크기 60×60, 좌상단 (x=210, y=100) -->
  <!-- 컬럼 라벨 (위, y=92) x = 210 + col*60 + 30 (셀 중심) -->

  <text x="240" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0">삼성전자</text>
  <text x="300" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0">SK하이닉스</text>
  <text x="360" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0">카카오</text>
  <text x="420" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0">네이버</text>
  <text x="480" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0">LG전자</text>

  <!-- 행 라벨 (좌, x=205) y = 100 + row*60 + 30 + 4 (셀 중심 수직 중앙) -->
  <text x="200" y="134" text-anchor="end" font-size="10" fill="#e2e8f0">삼성전자</text>
  <text x="200" y="194" text-anchor="end" font-size="10" fill="#e2e8f0">SK하이닉스</text>
  <text x="200" y="254" text-anchor="end" font-size="10" fill="#e2e8f0">카카오</text>
  <text x="200" y="314" text-anchor="end" font-size="10" fill="#e2e8f0">네이버</text>
  <text x="200" y="374" text-anchor="end" font-size="10" fill="#e2e8f0">LG전자</text>

  <!-- ===== 셀 행렬 ===== -->
  <!-- 색상 매핑: ρ≥0.9 → #dc2626, ρ≥0.75 → #f59e0b, ρ≥0.6 → #fbbf24, ρ≥0.4 → #60a5fa -->
  <!-- 대각선(1.00) = #dc2626 -->

  <!-- Row 0: 삼성전자 -->
  <!-- (0,0) 1.00 → #dc2626 -->
  <rect x="210" y="100" width="58" height="58" fill="#dc2626"/>
  <text x="239" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#e2e8f0">1.00</text>

  <!-- (0,1) 0.85 → #f59e0b -->
  <rect x="270" y="100" width="58" height="58" fill="#f59e0b"/>
  <text x="299" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.85</text>

  <!-- (0,2) 0.62 → #fbbf24 -->
  <rect x="330" y="100" width="58" height="58" fill="#fbbf24"/>
  <text x="359" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.62</text>

  <!-- (0,3) 0.65 → #fbbf24 -->
  <rect x="390" y="100" width="58" height="58" fill="#fbbf24"/>
  <text x="419" y="133" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f1419">0.65</text>


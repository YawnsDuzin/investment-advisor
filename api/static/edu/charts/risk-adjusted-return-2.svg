<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#0f1419"/>

  <!-- 제목 영역 -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">Sharpe·Sortino·MDD — 위험조정수익률 4지표</text>

  <!-- 차트 배경 -->
  <rect x="60" y="70" width="480" height="310" fill="#1a1f2e" opacity="0.3"/>

  <!-- Y축 격자선 -->
  <!-- Y축 범위 80~150, 차트 y=80~380, h=300 -->
  <!-- price=80 → y=380, price=100 → y=380-300*(100-80)/70=380-85.7=294, price=120 → y=380-300*(120-80)/70=380-171.4=209, price=140 → y=380-300*(140-80)/70=380-257.1=123 -->
  <line x1="60" y1="380" x2="540" y2="380" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  <text x="52" y="384" text-anchor="end" font-size="10" fill="#94a3b8">80</text>

  <line x1="60" y1="294" x2="540" y2="294" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  <text x="52" y="298" text-anchor="end" font-size="10" fill="#94a3b8">100</text>

  <line x1="60" y1="209" x2="540" y2="209" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  <text x="52" y="213" text-anchor="end" font-size="10" fill="#94a3b8">120</text>

  <line x1="60" y1="123" x2="540" y2="123" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  <text x="52" y="127" text-anchor="end" font-size="10" fill="#94a3b8">140</text>

  <!-- Y축 라벨 -->
  <text x="20" y="230" text-anchor="middle" font-size="10" fill="#94a3b8" transform="rotate(-90,20,230)">가격 지수</text>

  <!-- X축 -->
  <line x1="60" y1="380" x2="540" y2="380" stroke="#94a3b8" stroke-width="1"/>
  <text x="60" y="398" text-anchor="middle" font-size="11" fill="#94a3b8">T</text>
  <text x="540" y="398" text-anchor="middle" font-size="11" fill="#94a3b8">T+12개월</text>

  <!-- 가격 데이터 포인트 계산 -->
  <!-- x = 60 + i * (480/11) = 60 + i*43.6 -->
  <!-- prices: [100,110,115,120,130,125,95,80,90,105,120,135] -->
  <!-- y = 380 - (price-80)*300/70 -->
  <!-- i=0: x=60,  p=100 → y=380-85.7=294 -->
  <!-- i=1: x=104, p=110 → y=380-128.6=251 -->
  <!-- i=2: x=147, p=115 → y=380-149.9=230 (부동 반올림) -->
  <!-- i=3: x=191, p=120 → y=380-171.4=209 -->
  <!-- i=4: x=234, p=130 → y=380-214.3=166 (전고점) -->
  <!-- i=5: x=278, p=125 → y=380-192.9=187 -->
  <!-- i=6: x=322, p=95  → y=380-64.3=316 -->
  <!-- i=7: x=365, p=80  → y=380-0=380 (최저점) -->
  <!-- i=8: x=409, p=90  → y=380-42.9=337 -->
  <!-- i=9: x=452, p=105 → y=380-107.1=273 -->
  <!-- i=10:x=496, p=120 → y=380-171.4=209 -->
  <!-- i=11:x=540, p=135 → y=380-235.7=144 -->

  <!-- MDD 영역 강조 (idx4 고점 x=234 → idx7 저점 x=365) -->
  <rect x="234" y="70" width="131" height="310" fill="#ef4444" opacity="0.12"/>

  <!-- MDD 구간 레이블 -->
  <text x="299" y="90" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="bold">MDD 구간</text>
  <text x="299" y="106" text-anchor="middle" font-size="11" fill="#ef4444">-38.5%</text>

  <!-- 가격 라인 -->
  <polyline points="60,294 104,251 147,230 191,209 234,166 278,187 322,316 365,380 409,337 452,273 496,209 540,144"
            fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linejoin="round"/>

  <!-- 전고점 마커 (idx4: x=234, y=166) -->
  <circle cx="234" cy="166" r="5" fill="#f59e0b"/>
  <text x="224" y="158" text-anchor="middle" font-size="10" fill="#f59e0b">고점 130</text>

  <!-- 최저점 마커 (idx7: x=365, y=380) -->
  <circle cx="365" cy="380" r="5" fill="#f59e0b"/>
  <text x="365" y="375" text-anchor="middle" font-size="10" fill="#f59e0b">저점 80</text>

  <!-- MDD 화살표 표시 -->
  <line x1="234" y1="166" x2="365" y2="380" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- 우상단 정보 박스 -->
  <rect x="560" y="80" width="200" height="200" rx="6" fill="#1a1f2e" opacity="0.85"/>
  <rect x="560" y="80" width="200" height="200" rx="6" fill="none" stroke="#2d3748" stroke-width="1"/>

  <!-- 박스 헤더 -->
  <text x="660" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#e2e8f0">위험조정 4지표</text>
  <line x1="568" y1="110" x2="752" y2="110" stroke="#2d3748" stroke-width="1"/>

  <!-- 지표 내용 -->
  <text x="575" y="135" font-size="13" fill="#94a3b8">Sharpe</text>
  <text x="750" y="135" text-anchor="end" font-size="13" font-weight="bold" fill="#4ade80">= 1.2</text>

  <text x="575" y="160" font-size="13" fill="#94a3b8">Sortino</text>
  <text x="750" y="160" text-anchor="end" font-size="13" font-weight="bold" fill="#4ade80">= 1.8</text>

  <text x="575" y="185" font-size="13" fill="#94a3b8">MDD</text>
  <text x="750" y="185" text-anchor="end" font-size="13" font-weight="bold" fill="#ef4444">= -38%</text>

  <text x="575" y="210" font-size="13" fill="#94a3b8">Beta</text>
  <text x="750" y="210" text-anchor="end" font-size="13" font-weight="bold" fill="#60a5fa">= 0.9</text>

  <!-- 지표 설명 -->
  <rect x="560" y="295" width="200" height="85" rx="6" fill="#1a1f2e" opacity="0.5"/>
  <text x="575" y="314" font-size="10" fill="#94a3b8">Sharpe = (수익률-무위험)/σ</text>
  <text x="575" y="330" font-size="10" fill="#94a3b8">Sortino = (수익률-무위험)/하방σ</text>
  <text x="575" y="346" font-size="10" fill="#94a3b8">MDD = 최대 낙폭 (고점→저점)</text>
  <text x="575" y="362" font-size="10" fill="#94a3b8">Beta = 시장 대비 민감도</text>

  <!-- 캡션 -->
  <text x="400" y="430" text-anchor="middle" font-size="11" fill="#94a3b8">수익률만 보면 거짓말 — 위험·낙폭이 진짜 실력</text>
</svg>

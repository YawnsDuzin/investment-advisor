<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#0f1419"/>

  <!-- 제목 / 부제 -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">한국 기준금리·코스피 (2018~2024)</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#94a3b8">금리 인상 → 주가 하락 패턴 (2022)</text>

  <!-- 배경 패널 -->
  <rect x="80" y="80" width="640" height="290" fill="#1a1f2e" rx="4"/>

  <!-- X축 격자 세로선 -->
  <line x1="187" y1="80" x2="187" y2="370" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  <line x1="293" y1="80" x2="293" y2="370" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="80" x2="400" y2="370" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  <line x1="507" y1="80" x2="507" y2="370" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  <line x1="613" y1="80" x2="613" y2="370" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  <line x1="720" y1="80" x2="720" y2="370" stroke="#2d3748" stroke-width="1" opacity="0.5"/>

  <!-- Y축 격자 가로선 (좌 기준금리 0~4) -->
  <!-- rate=0: y=370, rate=1: y=297.5, rate=2: y=225, rate=3: y=152.5, rate=4: y=80 -->
  <line x1="80" y1="370" x2="720" y2="370" stroke="#2d3748" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="297" x2="720" y2="297" stroke="#2d3748" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="225" x2="720" y2="225" stroke="#2d3748" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="152" x2="720" y2="152" stroke="#2d3748" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="80" x2="720" y2="80" stroke="#2d3748" stroke-width="1" opacity="0.3"/>

  <!-- 좌 Y축 라벨 (기준금리 %) -->
  <text x="72" y="374" text-anchor="end" font-size="11" fill="#f59e0b">0</text>
  <text x="72" y="301" text-anchor="end" font-size="11" fill="#f59e0b">1</text>
  <text x="72" y="229" text-anchor="end" font-size="11" fill="#f59e0b">2</text>
  <text x="72" y="156" text-anchor="end" font-size="11" fill="#f59e0b">3</text>
  <text x="72" y="84" text-anchor="end" font-size="11" fill="#f59e0b">4</text>
  <text x="80" y="70" text-anchor="middle" font-size="12" fill="#f59e0b" font-weight="bold">금리 (%)</text>

  <!-- 우 Y축 라벨 (코스피 천) -->
  <!-- kospi range 1.5~3.5, y = 370 - (v-1.5)*290/2 -->
  <!-- 1.5→370, 2.0→297.5, 2.5→225, 3.0→152.5, 3.5→80 -->
  <text x="728" y="374" text-anchor="start" font-size="11" fill="#60a5fa">1.5</text>
  <text x="728" y="301" text-anchor="start" font-size="11" fill="#60a5fa">2.0</text>
  <text x="728" y="229" text-anchor="start" font-size="11" fill="#60a5fa">2.5</text>
  <text x="728" y="156" text-anchor="start" font-size="11" fill="#60a5fa">3.0</text>
  <text x="728" y="84" text-anchor="start" font-size="11" fill="#60a5fa">3.5</text>
  <text x="720" y="70" text-anchor="middle" font-size="12" fill="#60a5fa" font-weight="bold">KOSPI (천)</text>

  <!-- X축 라벨 -->
  <text x="80"  y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2018</text>
  <text x="187" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2019</text>
  <text x="293" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2020</text>
  <text x="400" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2021</text>
  <text x="507" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2022</text>
  <text x="613" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2023</text>
  <text x="720" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2024</text>

  <!-- 2022 경고 박스 (금리↑ KOSPI↓) -->
  <rect x="507" y="80" width="106" height="290" stroke="#ef4444" stroke-dasharray="5,3" fill="none" stroke-width="1.5" opacity="0.7"/>
  <text x="560" y="76" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="bold">금리↑ KOSPI↓</text>

  <!-- 기준금리 라인 (좌 Y축, y = 370 - rate*290/4) -->
  <!-- 2018=1.5→261, 2019=1.25→279, 2020=0.5→334, 2021=1.0→297, 2022=3.25→134, 2023=3.5→116, 2024=3.5→116 -->
  <polyline
    points="80,261 187,279 293,334 400,297 507,134 613,116 720,116"
    fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="80"  cy="261" r="4" fill="#f59e0b"/>
  <circle cx="187" cy="279" r="4" fill="#f59e0b"/>
  <circle cx="293" cy="334" r="4" fill="#f59e0b"/>
  <circle cx="400" cy="297" r="4" fill="#f59e0b"/>
  <circle cx="507" cy="134" r="4" fill="#f59e0b"/>
  <circle cx="613" cy="116" r="4" fill="#f59e0b"/>
  <circle cx="720" cy="116" r="4" fill="#f59e0b"/>

  <!-- 코스피 라인 (우 Y축, y = 370 - (v-1.5)*290/2) -->
  <!-- 2018=2.04→291.7, 2019=2.20→282, 2020=2.87→252, 2021=2.97→246.7, 2022=2.24→279.2, 2023=2.65→254, 2024=2.59→257.4 -->
  <polyline
    points="80,292 187,282 293,252 400,247 507,279 613,254 720,258"
    fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="80"  cy="292" r="4" fill="#60a5fa"/>
  <circle cx="187" cy="282" r="4" fill="#60a5fa"/>
  <circle cx="293" cy="252" r="4" fill="#60a5fa"/>
  <circle cx="400" cy="247" r="4" fill="#60a5fa"/>
  <circle cx="507" cy="279" r="4" fill="#60a5fa"/>
  <circle cx="613" cy="254" r="4" fill="#60a5fa"/>
  <circle cx="720" cy="258" r="4" fill="#60a5fa"/>

  <!-- 범례 -->
  <rect x="555" y="88" width="12" height="12" fill="#f59e0b" rx="2"/>
  <text x="572" y="99" font-size="12" fill="#e2e8f0">금리</text>
  <rect x="555" y="108" width="12" height="12" fill="#60a5fa" rx="2"/>
  <text x="572" y="119" font-size="12" fill="#e2e8f0">KOSPI</text>

  <!-- 캡션 -->
  <text x="400" y="425" text-anchor="middle" font-size="11" fill="#64748b">Source: 한국은행 / KRX</text>
</svg>

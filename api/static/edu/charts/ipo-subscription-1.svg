<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#0f1419"/>

  <!-- 제목 -->
  <text x="400" y="30" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">공모주 청약 5단계 타임라인</text>
  <text x="400" y="50" font-size="12" fill="#94a3b8" text-anchor="middle">수요예측부터 락업 해제까지</text>

  <!-- 박스 1: 수요예측 -->
  <rect x="60" y="140" width="130" height="100" rx="8" fill="#60a5fa" fill-opacity="0.3" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="125" y="170" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">수요예측</text>
  <text x="125" y="192" font-size="11" fill="#94a3b8" text-anchor="middle">D-21</text>
  <text x="125" y="215" font-size="10" fill="#e2e8f0" text-anchor="middle">기관 공모가 결정</text>

  <!-- 화살표 1 -->
  <polygon points="191,183 201,190 191,197" fill="#94a3b8"/>

  <!-- 박스 2: 청약 -->
  <rect x="200" y="140" width="130" height="100" rx="8" fill="#4ade80" fill-opacity="0.4" stroke="#4ade80" stroke-width="1.5"/>
  <text x="265" y="170" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">청약</text>
  <text x="265" y="192" font-size="11" fill="#94a3b8" text-anchor="middle">D-7~5</text>
  <text x="265" y="215" font-size="10" fill="#e2e8f0" text-anchor="middle">일반 청약 2일</text>

  <!-- 화살표 2 -->
  <polygon points="331,183 341,190 331,197" fill="#94a3b8"/>

  <!-- 박스 3: 환불 -->
  <rect x="340" y="140" width="130" height="100" rx="8" fill="#94a3b8" fill-opacity="0.3" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="405" y="170" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">환불</text>
  <text x="405" y="192" font-size="11" fill="#94a3b8" text-anchor="middle">D-3</text>
  <text x="405" y="215" font-size="10" fill="#e2e8f0" text-anchor="middle">미배정 환불</text>

  <!-- 화살표 3 -->
  <polygon points="471,183 481,190 471,197" fill="#94a3b8"/>

  <!-- 박스 4: 상장 -->
  <rect x="480" y="140" width="130" height="100" rx="8" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="545" y="170" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">상장</text>
  <text x="545" y="192" font-size="11" fill="#94a3b8" text-anchor="middle">D-Day</text>
  <text x="545" y="215" font-size="10" fill="#e2e8f0" text-anchor="middle">거래 시작</text>

  <!-- 화살표 4 -->
  <polygon points="611,183 621,190 611,197" fill="#94a3b8"/>

  <!-- 박스 5: 락업 해제 -->
  <rect x="620" y="140" width="130" height="100" rx="8" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="685" y="170" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">락업 해제</text>
  <text x="685" y="192" font-size="11" fill="#94a3b8" text-anchor="middle">D+30/90/180</text>
  <text x="685" y="215" font-size="10" fill="#e2e8f0" text-anchor="middle">기관 매도 가능</text>

  <!-- 락업 해제 경고 라벨 -->
  <text x="685" y="125" font-size="11" fill="#ef4444" text-anchor="middle">단기 변동성 큰 구간</text>

  <!-- 하단 상세 설명 -->
  <rect x="60" y="275" width="680" height="120" rx="6" fill="#1a1f2e" fill-opacity="0.6" stroke="#2d3748" stroke-width="1"/>

  <text x="80" y="300" font-size="11" font-weight="bold" fill="#60a5fa">수요예측</text>
  <text x="80" y="318" font-size="10" fill="#94a3b8">기관투자자 참여</text>
  <text x="80" y="334" font-size="10" fill="#94a3b8">공모가 확정</text>

  <text x="210" y="300" font-size="11" font-weight="bold" fill="#4ade80">청약</text>
  <text x="210" y="318" font-size="10" fill="#94a3b8">일반+우리사주</text>
  <text x="210" y="334" font-size="10" fill="#94a3b8">증거금 납입</text>

  <text x="350" y="300" font-size="11" font-weight="bold" fill="#94a3b8">환불</text>
  <text x="350" y="318" font-size="10" fill="#94a3b8">미배정 증거금</text>
  <text x="350" y="334" font-size="10" fill="#94a3b8">D+2 영업일 환불</text>

  <text x="490" y="300" font-size="11" font-weight="bold" fill="#f59e0b">상장</text>
  <text x="490" y="318" font-size="10" fill="#94a3b8">시초가 ±60%</text>
  <text x="490" y="334" font-size="10" fill="#94a3b8">이후 ±30% 변동</text>

  <text x="630" y="300" font-size="11" font-weight="bold" fill="#ef4444">락업 해제</text>
  <text x="630" y="318" font-size="10" fill="#94a3b8">기관 의무보유</text>
  <text x="630" y="334" font-size="10" fill="#94a3b8">해제 후 매도 출회</text>

  <!-- 캡션 -->
  <text x="400" y="425" font-size="10" fill="#64748b" text-anchor="middle" font-style="italic">*균등 50% + 비례 50% 의무 — 소액 투자자는 다증권사 분산 청약이 정석*</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#0f1419"/>

  <!-- 제목 -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">포지션 사이징 — 10번 연속 손실 시 자본 변화</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#94a3b8">1% 룰 / 5% 룰 / 몰빵 50% 비교</text>

  <!-- 차트 배경 -->
  <rect x="80" y="80" width="640" height="290" fill="#1a1f2e" rx="4"/>

  <!-- Y축 격자선 및 라벨 (0/20/40/60/80/100) -->
  <!-- y_svg = 370 - capital * 2.9 -->
  <!-- 0   → y=370 -->
  <!-- 20  → y=370-58=312 -->
  <!-- 40  → y=370-116=254 -->
  <!-- 60  → y=370-174=196 -->
  <!-- 80  → y=370-232=138 -->
  <!-- 100 → y=370-290=80  -->
  <line x1="80" y1="370" x2="720" y2="370" stroke="#2d3748" stroke-width="1"/>
  <text x="72" y="374" text-anchor="end" font-size="10" fill="#94a3b8">0</text>

  <line x1="80" y1="312" x2="720" y2="312" stroke="#2d3748" stroke-width="1"/>
  <text x="72" y="316" text-anchor="end" font-size="10" fill="#94a3b8">20</text>

  <line x1="80" y1="254" x2="720" y2="254" stroke="#2d3748" stroke-width="1"/>
  <text x="72" y="258" text-anchor="end" font-size="10" fill="#94a3b8">40</text>

  <line x1="80" y1="196" x2="720" y2="196" stroke="#2d3748" stroke-width="1"/>
  <text x="72" y="200" text-anchor="end" font-size="10" fill="#94a3b8">60</text>

  <line x1="80" y1="138" x2="720" y2="138" stroke="#2d3748" stroke-width="1"/>
  <text x="72" y="142" text-anchor="end" font-size="10" fill="#94a3b8">80</text>

  <line x1="80" y1="80" x2="720" y2="80" stroke="#2d3748" stroke-width="1"/>
  <text x="72" y="84" text-anchor="end" font-size="10" fill="#94a3b8">100</text>

  <!-- Y축 레이블 -->
  <text x="30" y="230" text-anchor="middle" font-size="11" fill="#94a3b8" transform="rotate(-90,30,230)">잔여 자본 (%)</text>

  <!-- 1% 룰 라인 (#4ade80) -->
  <!-- 데이터: [100, 99.0, 98.0, 97.0, 96.1, 95.1, 94.1, 93.2, 92.3, 91.4, 90.4] -->
  <!-- y = 370 - capital * 2.9 -->
  <!-- i=0:  100 → y=370-290=80,   x=80  -->
  <!-- i=1:  99.0→ y=370-287.1=82.9≈83,  x=144 -->
  <!-- i=2:  98.0→ y=370-284.2=85.8≈86,  x=208 -->
  <!-- i=3:  97.0→ y=370-281.3=88.7≈89,  x=272 -->
  <!-- i=4:  96.1→ y=370-278.69=91.3≈91, x=336 -->
  <!-- i=5:  95.1→ y=370-275.79=94.2≈94, x=400 -->
  <!-- i=6:  94.1→ y=370-272.89=97.1≈97, x=464 -->
  <!-- i=7:  93.2→ y=370-270.28=99.7≈100,x=528 -->
  <!-- i=8:  92.3→ y=370-267.67=102.3≈102,x=592-->
  <!-- i=9:  91.4→ y=370-265.06=104.9≈105,x=656-->
  <!-- i=10: 90.4→ y=370-262.16=107.8≈108,x=720-->
  <polyline
    points="80,80 144,83 208,86 272,89 336,91 400,94 464,97 528,100 592,102 656,105 720,108"
    stroke="#4ade80" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

  <!-- 1% 룰 마커 -->
  <circle cx="80"  cy="80"  r="4" fill="#4ade80"/>
  <circle cx="144" cy="83"  r="4" fill="#4ade80"/>
  <circle cx="208" cy="86"  r="4" fill="#4ade80"/>
  <circle cx="272" cy="89"  r="4" fill="#4ade80"/>
  <circle cx="336" cy="91"  r="4" fill="#4ade80"/>
  <circle cx="400" cy="94"  r="4" fill="#4ade80"/>
  <circle cx="464" cy="97"  r="4" fill="#4ade80"/>
  <circle cx="528" cy="100" r="4" fill="#4ade80"/>
  <circle cx="592" cy="102" r="4" fill="#4ade80"/>
  <circle cx="656" cy="105" r="4" fill="#4ade80"/>
  <circle cx="720" cy="108" r="4" fill="#4ade80"/>

  <!-- 5% 룰 라인 (#f59e0b) -->
  <!-- 데이터: [100, 95.0, 90.3, 85.7, 81.5, 77.4, 73.5, 69.8, 66.3, 63.0, 59.9] -->
  <!-- i=0:  100  → y=370-290=80,    x=80  -->
  <!-- i=1:  95.0 → y=370-275.5=94.5≈95,  x=144 -->
  <!-- i=2:  90.3 → y=370-261.87=108.1≈108,x=208-->
  <!-- i=3:  85.7 → y=370-248.53=121.5≈122,x=272-->
  <!-- i=4:  81.5 → y=370-236.35=133.6≈134,x=336-->
  <!-- i=5:  77.4 → y=370-224.46=145.5≈146,x=400-->
  <!-- i=6:  73.5 → y=370-213.15=156.8≈157,x=464-->
  <!-- i=7:  69.8 → y=370-202.42=167.6≈168,x=528-->
  <!-- i=8:  66.3 → y=370-192.27=177.7≈178,x=592-->
  <!-- i=9:  63.0 → y=370-182.7=187.3≈187, x=656-->
  <!-- i=10: 59.9 → y=370-173.71=196.3≈196,x=720-->
  <polyline
    points="80,80 144,95 208,108 272,122 336,134 400,146 464,157 528,168 592,178 656,187 720,196"
    stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

  <!-- 5% 룰 마커 -->
  <circle cx="80"  cy="80"  r="4" fill="#f59e0b"/>
  <circle cx="144" cy="95"  r="4" fill="#f59e0b"/>
  <circle cx="208" cy="108" r="4" fill="#f59e0b"/>
  <circle cx="272" cy="122" r="4" fill="#f59e0b"/>
  <circle cx="336" cy="134" r="4" fill="#f59e0b"/>
  <circle cx="400" cy="146" r="4" fill="#f59e0b"/>
  <circle cx="464" cy="157" r="4" fill="#f59e0b"/>
  <circle cx="528" cy="168" r="4" fill="#f59e0b"/>
  <circle cx="592" cy="178" r="4" fill="#f59e0b"/>
  <circle cx="656" cy="187" r="4" fill="#f59e0b"/>
  <circle cx="720" cy="196" r="4" fill="#f59e0b"/>

  <!-- 몰빵 50% 라인 (#ef4444) -->
  <!-- 데이터: [100, 50.0, 25.0, 12.5, 6.3, 3.1, 1.6, 0.8, 0.4, 0.2, 0.1] -->
  <!-- i=0:  100  → y=370-290=80,    x=80  -->
  <!-- i=1:  50.0 → y=370-145=225,   x=144 -->
  <!-- i=2:  25.0 → y=370-72.5=297.5≈298,x=208-->
  <!-- i=3:  12.5 → y=370-36.25=333.8≈334,x=272-->
  <!-- i=4:  6.3  → y=370-18.27=351.7≈352,x=336-->
  <!-- i=5:  3.1  → y=370-8.99=361.0≈361, x=400-->
  <!-- i=6:  1.6  → y=370-4.64=365.4≈365, x=464-->
  <!-- i=7:  0.8  → y=370-2.32=367.7≈368, x=528-->
  <!-- i=8:  0.4  → y=370-1.16=368.8≈369, x=592-->
  <!-- i=9:  0.2  → y=370-0.58=369.4≈369, x=656-->
  <!-- i=10: 0.1  → y=370-0.29=369.7≈370, x=720-->
  <polyline
    points="80,80 144,225 208,298 272,334 336,352 400,361 464,365 528,368 592,369 656,369 720,370"
    stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

  <!-- 몰빵 마커 -->
  <circle cx="80"  cy="80"  r="4" fill="#ef4444"/>
  <circle cx="144" cy="225" r="4" fill="#ef4444"/>
  <circle cx="208" cy="298" r="4" fill="#ef4444"/>
  <circle cx="272" cy="334" r="4" fill="#ef4444"/>
  <circle cx="336" cy="352" r="4" fill="#ef4444"/>
  <circle cx="400" cy="361" r="4" fill="#ef4444"/>
  <circle cx="464" cy="365" r="4" fill="#ef4444"/>
  <circle cx="528" cy="368" r="4" fill="#ef4444"/>
  <circle cx="592" cy="369" r="4" fill="#ef4444"/>
  <circle cx="656" cy="369" r="4" fill="#ef4444"/>
  <circle cx="720" cy="370" r="4" fill="#ef4444"/>

  <!-- X축 라인 -->
  <line x1="80" y1="370" x2="720" y2="370" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Y축 라인 -->
  <line x1="80" y1="80" x2="80" y2="370" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- X축 라벨: 0~10 -->
  <text x="80"  y="388" text-anchor="middle" font-size="11" fill="#94a3b8">0</text>
  <text x="144" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">1</text>
  <text x="208" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">2</text>
  <text x="272" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">3</text>
  <text x="336" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">4</text>
  <text x="400" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">5</text>
  <text x="464" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">6</text>
  <text x="528" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">7</text>
  <text x="592" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">8</text>
  <text x="656" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">9</text>
  <text x="720" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">10</text>

  <!-- X축 레이블 -->
  <text x="400" y="408" text-anchor="middle" font-size="11" fill="#94a3b8">매매 횟수</text>

  <!-- 끝점 라벨 -->
  <text x="728" y="112" font-size="12" fill="#4ade80">1% 룰: 90%</text>
  <text x="728" y="200" font-size="12" fill="#f59e0b">5% 룰: 60%</text>
  <!-- 몰빵 끝점 X축에 수렴 — 라벨은 위쪽으로 -->
  <text x="600" y="362" font-size="12" fill="#ef4444">몰빵: 0.1%</text>

  <!-- 범례 박스 -->
  <rect x="130" y="95" width="180" height="80" fill="#1a1f2e" opacity="0.85" stroke="#2d3748" stroke-width="1" rx="4"/>
  <!-- 1% 룰 -->
  <rect x="142" y="110" width="14" height="8" fill="#4ade80" rx="2"/>
  <text x="162" y="120" font-size="13" fill="#4ade80">1% 룰</text>
  <!-- 5% 룰 -->
  <rect x="142" y="130" width="14" height="8" fill="#f59e0b" rx="2"/>
  <text x="162" y="140" font-size="13" fill="#f59e0b">5% 룰</text>
  <!-- 몰빵 -->
  <rect x="142" y="150" width="14" height="8" fill="#ef4444" rx="2"/>
  <text x="162" y="160" font-size="13" fill="#ef4444">몰빵 50%</text>

  <!-- 캡션 -->
  <text x="400" y="432" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">*사이징은 방어 — 종목 선정은 공격, 망하는 사람은 사이징을 빼먹는다*</text>
</svg>

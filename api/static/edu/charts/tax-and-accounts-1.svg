<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#0f1419"/>

  <!-- 제목 -->
  <text x="400" y="30" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">절세 계좌 비교 — 5천만원 수익 시 세금</text>
  <!-- 부제 -->
  <text x="400" y="50" font-size="12" fill="#94a3b8" text-anchor="middle">ISA / 연금저축 / 일반계좌</text>

  <!-- 차트 배경 -->
  <rect x="80" y="80" width="640" height="290" fill="#1a1f2e" opacity="0.3" rx="4"/>

  <!-- Y축 격자선 및 라벨 -->
  <!-- y=370 → 0만원 / y=370-290*(300/1200)=370-72.5=297.5 → 300만원 / y=370-145=225 → 600만원 / y=370-217.5=152.5 → 900만원 / y=370-290=80 → 1200만원 -->
  <!-- 0 -->
  <line x1="80" y1="370" x2="720" y2="370" stroke="#2d3748" stroke-width="1"/>
  <text x="72" y="374" font-size="10" fill="#94a3b8" text-anchor="end">0</text>
  <!-- 300 -->
  <line x1="80" y1="297" x2="720" y2="297" stroke="#2d3748" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="72" y="301" font-size="10" fill="#94a3b8" text-anchor="end">300</text>
  <!-- 600 -->
  <line x1="80" y1="225" x2="720" y2="225" stroke="#2d3748" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="72" y="229" font-size="10" fill="#94a3b8" text-anchor="end">600</text>
  <!-- 900 -->
  <line x1="80" y1="152" x2="720" y2="152" stroke="#2d3748" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="72" y="156" font-size="10" fill="#94a3b8" text-anchor="end">900</text>
  <!-- 1200 -->
  <line x1="80" y1="80" x2="720" y2="80" stroke="#2d3748" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="72" y="84" font-size="10" fill="#94a3b8" text-anchor="end">1200</text>
  <!-- Y축 단위 라벨 -->
  <text x="72" y="70" font-size="9" fill="#94a3b8" text-anchor="end">(만원)</text>

  <!-- ===== ISA (x_center=220) ===== -->
  <!-- 막대1: 0만원 (최선, 한도 내) — 높이 0이므로 라벨만 -->
  <text x="192" y="365" font-size="10" fill="#e2e8f0" text-anchor="middle">0만원</text>
  <rect x="167" y="365" width="50" height="5" fill="#4ade80" rx="2"/>

  <!-- 막대2: 495만원 (초과분 9.9%) — y=370-290*(495/1200)=370-119.6=250.4 -->
  <rect x="223" y="250" width="50" height="120" fill="#4ade80" opacity="0.6" rx="2"/>
  <text x="248" y="245" font-size="10" fill="#e2e8f0" text-anchor="middle">495만원</text>

  <!-- X축 라벨: ISA -->
  <text x="220" y="388" font-size="13" fill="#e2e8f0" text-anchor="middle">ISA</text>

  <!-- ===== 연금저축 (x_center=400) ===== -->
  <!-- 막대1: 165만원 (만 55세 후 3.3%) — y=370-290*(165/1200)=370-39.9=330.1 -->
  <rect x="345" y="330" width="50" height="40" fill="#60a5fa" rx="2"/>
  <text x="370" y="325" font-size="10" fill="#e2e8f0" text-anchor="middle">165만원</text>

  <!-- 막대2: 825만원 (해약 시 16.5%) — y=370-290*(825/1200)=370-199.4=170.6 -->
  <rect x="405" y="171" width="50" height="199" fill="#60a5fa" opacity="0.6" rx="2"/>
  <text x="430" y="166" font-size="10" fill="#e2e8f0" text-anchor="middle">825만원</text>

  <!-- X축 라벨: 연금저축 -->
  <text x="400" y="388" font-size="13" fill="#e2e8f0" text-anchor="middle">연금저축</text>

  <!-- ===== 일반계좌 (x_center=580) ===== -->
  <!-- 막대1: 1100만원 (양도세 22%) — y=370-290*(1100/1200)=370-265.8=104.2 -->
  <rect x="525" y="104" width="50" height="266" fill="#ef4444" rx="2"/>
  <text x="550" y="99" font-size="10" fill="#e2e8f0" text-anchor="middle">1,100만원</text>

  <!-- 막대2: 동일 시나리오 -->
  <rect x="585" y="104" width="50" height="266" fill="#ef4444" opacity="0.6" rx="2"/>
  <text x="610" y="99" font-size="10" fill="#e2e8f0" text-anchor="middle">1,100만원</text>

  <!-- X축 라벨: 일반계좌 -->
  <text x="580" y="388" font-size="13" fill="#e2e8f0" text-anchor="middle">일반계좌</text>

  <!-- 범례 박스 -->
  <rect x="540" y="95" width="170" height="55" fill="#1a1f2e" opacity="0.5" rx="4" stroke="#2d3748" stroke-width="1"/>
  <rect x="550" y="107" width="14" height="14" fill="#e2e8f0" opacity="0.9" rx="2"/>
  <text x="570" y="119" font-size="11" fill="#e2e8f0">최선 시나리오</text>
  <rect x="550" y="127" width="14" height="14" fill="#e2e8f0" opacity="0.45" rx="2"/>
  <text x="570" y="139" font-size="11" fill="#e2e8f0">최악 시나리오</text>

  <!-- 캡션 -->
  <text x="400" y="432" font-size="11" fill="#94a3b8" text-anchor="middle">*세금이 실수익률을 결정 — 5천만원 수익에 0원 vs 1,100만원 차이*</text>
</svg>

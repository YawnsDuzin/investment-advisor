<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#0f1419"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="bold">3종 재무제표 — 손익·재무상태·현금흐름의 관계</text>
  <text x="400" y="50" font-size="12" fill="#94a3b8" text-anchor="middle">당기순이익이 모든 흐름의 시작점</text>

  <!-- IS Box (left top, x=80, y=100, 200x120) -->
  <rect x="80" y="100" width="200" height="120" fill="#1a1f2e" opacity="0.7" stroke="#60a5fa" stroke-width="2" rx="8"/>
  <text x="180" y="125" font-size="14" fill="#60a5fa" font-weight="bold" text-anchor="middle">손익계산서 (IS)</text>
  <text x="180" y="152" font-size="11" fill="#e2e8f0" text-anchor="middle">매출</text>
  <text x="180" y="172" font-size="11" fill="#e2e8f0" text-anchor="middle">- 비용</text>
  <text x="180" y="192" font-size="11" fill="#4ade80" text-anchor="middle">= 순이익</text>

  <!-- BS Box (right top, x=520, y=100, 200x120) -->
  <rect x="520" y="100" width="200" height="120" fill="#1a1f2e" opacity="0.7" stroke="#4ade80" stroke-width="2" rx="8"/>
  <text x="620" y="125" font-size="14" fill="#4ade80" font-weight="bold" text-anchor="middle">재무상태표 (BS)</text>
  <text x="620" y="152" font-size="11" fill="#e2e8f0" text-anchor="middle">자산</text>
  <text x="620" y="172" font-size="11" fill="#e2e8f0" text-anchor="middle">= 부채 + 자본</text>
  <text x="620" y="192" font-size="10" fill="#94a3b8" text-anchor="middle">(이익잉여금 누적)</text>

  <!-- CF Box (center bottom, x=300, y=240, 200x120) -->
  <rect x="300" y="240" width="200" height="120" fill="#1a1f2e" opacity="0.7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="400" y="265" font-size="14" fill="#f59e0b" font-weight="bold" text-anchor="middle">현금흐름표 (CF)</text>
  <text x="400" y="292" font-size="11" fill="#e2e8f0" text-anchor="middle">영업CF</text>
  <text x="400" y="312" font-size="11" fill="#e2e8f0" text-anchor="middle">투자CF</text>
  <text x="400" y="332" font-size="11" fill="#e2e8f0" text-anchor="middle">재무CF</text>

  <!-- Arrow: IS (180, 220) → CF (400, 240) -->
  <line x1="180" y1="220" x2="390" y2="238" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="232" font-size="10" fill="#60a5fa" text-anchor="middle">순이익이 영업CF 시작</text>

  <!-- Arrow: CF (500, 300) → BS (620, 220) -->
  <line x1="500" y1="300" x2="622" y2="222" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="575" y="265" font-size="10" fill="#f59e0b" text-anchor="middle">현금잔고 누적</text>

  <!-- Arrow: IS (380, 160) → BS (520, 160) horizontal -->
  <line x1="380" y1="160" x2="518" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="152" font-size="10" fill="#4ade80" text-anchor="middle">이익잉여금</text>

  <!-- Caption -->
  <text x="400" y="425" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">*세 재무제표는 분리되지 않는다 — 흐름이 자산이 되고, 자산이 새 흐름을 만든다*</text>
</svg>

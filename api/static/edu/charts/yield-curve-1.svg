<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#0f1419"/>

  <!-- 제목 / 부제 -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#e2e8f0">정상 금리 곡선 (Normal Yield Curve)</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#94a3b8">장기 &gt; 단기 — 기간 프리미엄</text>

  <!-- 배경 패널 -->
  <rect x="120" y="80" width="600" height="290" fill="#1a1f2e" rx="4"/>

  <!-- Y축 격자 (0~5, step 1) -->
  <!-- y = 370 - rate*290/5 -->
  <!-- 0→370, 1→312, 2→254, 3→196, 4→138, 5→80 -->
  <line x1="120" y1="370" x2="720" y2="370" stroke="#2d3748" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="312" x2="720" y2="312" stroke="#2d3748" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="254" x2="720" y2="254" stroke="#2d3748" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="196" x2="720" y2="196" stroke="#2d3748" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="138" x2="720" y2="138" stroke="#2d3748" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="80"  x2="720" y2="80"  stroke="#2d3748" stroke-width="1" opacity="0.3"/>

  <!-- Y축 라벨 -->
  <text x="112" y="374" text-anchor="end" font-size="11" fill="#94a3b8">0%</text>
  <text x="112" y="316" text-anchor="end" font-size="11" fill="#94a3b8">1%</text>
  <text x="112" y="258" text-anchor="end" font-size="11" fill="#94a3b8">2%</text>
  <text x="112" y="200" text-anchor="end" font-size="11" fill="#94a3b8">3%</text>
  <text x="112" y="142" text-anchor="end" font-size="11" fill="#94a3b8">4%</text>
  <text x="112" y="84"  text-anchor="end" font-size="11" fill="#94a3b8">5%</text>

  <!-- X축 라벨 -->
  <text x="180" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">3M</text>
  <text x="340" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">2Y</text>
  <text x="500" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">10Y</text>
  <text x="660" y="390" text-anchor="middle" font-size="12" fill="#94a3b8">30Y</text>

  <!-- X축 수직선(틱) -->
  <line x1="180" y1="370" x2="180" y2="375" stroke="#94a3b8" stroke-width="1"/>
  <line x1="340" y1="370" x2="340" y2="375" stroke="#94a3b8" stroke-width="1"/>
  <line x1="500" y1="370" x2="500" y2="375" stroke="#94a3b8" stroke-width="1"/>
  <line x1="660" y1="370" x2="660" y2="375" stroke="#94a3b8" stroke-width="1"/>

  <!-- 곡선 아래 강조 영역 (fill gradient) -->
  <polygon
    points="180,254 340,196 500,138 660,109 660,370 180,370"
    fill="#4ade80" opacity="0.10"/>

  <!-- 라인 -->
  <polyline
    points="180,254 340,196 500,138 660,109"
    fill="none" stroke="#4ade80" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 마커 -->
  <circle cx="180" cy="254" r="8" fill="#4ade80"/>
  <circle cx="340" cy="196" r="8" fill="#4ade80"/>
  <circle cx="500" cy="138" r="8" fill="#4ade80"/>
  <circle cx="660" cy="109" r="8" fill="#4ade80"/>

  <!-- 수치 라벨 -->
  <text x="180" y="240" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="bold">2.0%</text>
  <text x="340" y="182" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="bold">3.0%</text>
  <text x="500" y="124" text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="bold">4.0%</text>
  <text x="660" y="95"  text-anchor="middle" font-size="13" fill="#e2e8f0" font-weight="bold">4.5%</text>

  <!-- 건강한 경제 라벨 박스 -->
  <rect x="138" y="98" width="185" height="52" fill="#1a1f2e" opacity="0.85" rx="4"/>
  <text x="148" y="120" font-size="14" fill="#4ade80" font-weight="bold">&#x2713; 건강한 경제</text>
  <text x="148" y="140" font-size="11" fill="#94a3b8">장기 &gt; 단기 수익률</text>

  <!-- 캡션 -->
  <text x="400" y="425" text-anchor="middle" font-size="11" fill="#64748b">장기 채권은 위험·불확실성 프리미엄으로 더 높은 금리</text>
</svg>
